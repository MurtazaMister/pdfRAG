services:
  - type: web
    name: pdf-rag-backend
    runtime: node
    rootDir: .
    # Install with devDependencies so workspace TypeScript builds (shared + backend) have tsc and module graph intact.
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile --force && pnpm --filter @pdf-rag/shared build && pnpm --filter @pdf-rag/backend build
    startCommand: pnpm --filter @pdf-rag/backend start
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-large
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: FRONTEND_ORIGIN
        sync: false
